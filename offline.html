<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>오프라인 — 제연설비 NFTC 501</title>
<link rel="icon" href="./icons/favicon.ico"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  min-height:100vh;
  background:linear-gradient(135deg,#0d1f33 0%,#1e3a5f 60%,#1a3050 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  color:#e2e8f0;
}
.wrap{text-align:center;padding:48px 28px;max-width:440px;}
.app-icon{
  width:96px;height:96px;border-radius:24px;
  overflow:hidden;margin:0 auto 28px;
  box-shadow:0 8px 32px rgba(0,0,0,.45);
}
.app-icon img{width:100%;height:100%;object-fit:cover;}
.signal{font-size:56px;margin-bottom:20px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
h1{font-size:20px;font-weight:900;margin-bottom:10px;letter-spacing:-.02em;}
p{font-size:13px;color:rgba(255,255,255,.7);line-height:1.7;margin-bottom:28px;}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#2b6cb0,#3182ce);
  color:#fff;border:none;padding:13px 30px;
  border-radius:12px;font-size:14px;font-weight:800;
  cursor:pointer;box-shadow:0 4px 20px rgba(49,130,206,.4);
  transition:all .2s;font-family:inherit;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 26px rgba(49,130,206,.5);}
.sub{margin-top:22px;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.05em;}
.badge{
  display:inline-block;margin-top:16px;
  background:rgba(99,179,237,.15);
  border:1px solid rgba(99,179,237,.3);
  color:#90cdf4;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="app-icon">
    <img src="./icons/icon-192x192.png" alt="제연설비 아이콘"/>
  </div>
  <div class="signal">📡</div>
  <h1>오프라인 상태입니다</h1>
  <p>
    인터넷 연결을 확인해 주세요.<br/>
    캐시된 데이터가 있다면 앱으로 돌아가 계속 사용할 수 있습니다.<br/>
    연결 복구 후 새로고침하면 최신 버전을 불러옵니다.
  </p>
  <button class="btn" onclick="location.href='./'">
    🔄 앱으로 돌아가기
  </button>
  <div class="badge">NFTC 501 · 제연설비 설계 계산서</div>
  <p class="sub">ENGINEER KIM MANMIN · Ver-3.0</p>
</div>
</body>
</html>
